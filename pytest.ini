[pytest]
testpaths = tests
python_files = test_*.py
addopts = -q
markers =
    unit: isolated single-module tests
    integration: cross-module tests (persistence, leakage+backtest, quality)
    e2e: full-pipeline acceptance scenarios (spec §24)
filterwarnings =
    ignore::DeprecationWarning
# Select a bucket with:  pytest -m unit  |  -m integration  |  -m e2e
