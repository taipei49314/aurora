# Copy this file to .github/workflows/ci.yml to enable GitHub Actions.
# (Pushing workflows requires a token with the `workflow` OAuth scope.)
#
#   mkdir -p .github/workflows
#   cp docs/ci-github-actions.yml .github/workflows/ci.yml
#
name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  check-all:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt

      - name: check-all
        env:
          PYTHONPATH: backend:.
        run: python scripts/check_all.py

      - name: Engine version sanity
        env:
          PYTHONPATH: backend
        run: |
          python -c "from aurora import __version__; from aurora.config import ENGINE_VERSION; assert __version__ == ENGINE_VERSION, (__version__, ENGINE_VERSION); print('engine', ENGINE_VERSION)"
