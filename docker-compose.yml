# One-command local stack (spec §4). NOTE: provided as configuration; not
# verified running on the build machine (no Docker there) — see self-audit.
services:
  backend:
    build: ./backend
    command: uvicorn api:app --host 0.0.0.0 --port 8000 --app-dir /app
    volumes:
      - ./backend:/app
      - ./datasets:/datasets
      - ./tests:/tests
    environment:
      - AURORA_TAXONOMY=/datasets/taxonomy/taxonomy.json
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    command: npm run dev -- --host 0.0.0.0
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend
